<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#00ff88" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <title>Hello World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container { text-align: center; position: relative; }

    h1 {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 900;
      color: transparent;
      background: linear-gradient(135deg, #00ff88 0%, #00ccff 50%, #ff00cc 100%);
      -webkit-background-clip: text;
      background-clip: text;
      animation: fadeIn 1s ease-out forwards, glow 3s ease-in-out infinite;
      opacity: 0;
    }

    .subtitle {
      margin-top: 1rem;
      font-size: 0.9rem;
      letter-spacing: 0.3em;
      color: #555;
      text-transform: uppercase;
      animation: fadeIn 1s ease-out 0.5s forwards;
      opacity: 0;
    }

    .glow-bg {
      position: absolute;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(0,255,136,0.08) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 4s ease-in-out infinite;
      z-index: -1;
    }

    /* 安裝提示按鈕 */
    #install-btn {
      display: none;
      margin-top: 2rem;
      padding: 0.7rem 1.8rem;
      background: transparent;
      border: 1px solid #00ff88;
      color: #00ff88;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.2s;
      animation: fadeIn 1s ease-out 1s forwards;
      opacity: 0;
    }
    #install-btn:hover { background: #00ff8820; }

    #status {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #333;
      letter-spacing: 0.1em;
    }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes glow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.2); }
    }
    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="glow-bg"></div>
    <h1>Hello World</h1>
    <p class="subtitle">PWA · 2026</p>
    <button id="install-btn">⬇ 安裝到主畫面</button>
    <p id="status"></p>
  </div>

  <script>
    // 註冊 Service Worker（離線支援）
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/hello-world-pwa/sw.js')
        .then(() => console.log('SW registered'))
        .catch(err => console.error('SW error:', err));
    }

    // 攔截安裝提示事件
    let deferredPrompt;
    const btn = document.getElementById('install-btn');
    const status = document.getElementById('status');

    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      btn.style.display = 'inline-block'; // 顯示安裝按鈕
    });

    btn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      status.textContent = outcome === 'accepted' ? '✓ 已加入主畫面' : '已取消';
      deferredPrompt = null;
      btn.style.display = 'none';
    });

    // 已安裝時隱藏按鈕
    window.addEventListener('appinstalled', () => {
      btn.style.display = 'none';
      status.textContent = '✓ App 已安裝';
    });
  </script>
</body>
</html>
